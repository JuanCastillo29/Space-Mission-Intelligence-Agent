services:

  db:
    build:
      context: .
      dockerfile: docker/db.dockerfile
    container_name: space-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: docker/migrator.dockerfile
    container_name: space-migrator
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: "no"

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion.dockerfile
    container_name: space-ingestion
    depends_on:
      migrator:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - ./data:/opt/project/data

  api:
    build:
      context: .
      dockerfile: docker/api.dockerfile
    container_name: space-api
    depends_on:
      migrator:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/opt/project/data

  dev_space:
    build:
      context: .
      dockerfile: docker/dev.dockerfile
    command: /bin/bash
    tty: true
    container_name: dev_space
    depends_on:
      migrator:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - .:/opt/project

volumes:
  pgdata:
