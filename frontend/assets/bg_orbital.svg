  <polyline points="45,32 120,78 210,25" fill="none" stroke="#4FC3F7" stroke-width="0.6" opacity="0.18"/>

  <!-- ═══ ORBITAL TRAJECTORIES ═══ -->

  <!-- Hohmann transfer – top right -->
  <ellipse cx="1050" cy="280" rx="200" ry="90" fill="none"
           stroke="#4FC3F7" stroke-width="1.0" opacity="0.25"
           transform="rotate(-25 1050 280)"/>
  <circle cx="860" cy="310" r="3.5" fill="none" stroke="#4FC3F7" stroke-width="0.8" opacity="0.3"/>
  <circle cx="860" cy="310" r="1.2" fill="#4FC3F7" opacity="0.4"/>
  <text x="920" y="200" fill="#4FC3F7" opacity="0.2" font-size="7.5"
        font-family="monospace" letter-spacing="1">
    TRAJECTORY_OPTIMIZED // LEO-TO-GATEWAY
  </text>
  <text x="835" y="330" fill="#4FC3F7" opacity="0.18" font-size="6.5"
        font-family="monospace" letter-spacing="1">
    PERIAPSIS: 420km
  </text>

  <!-- Lunar transfer – center left -->
  <ellipse cx="250" cy="450" rx="160" ry="70" fill="none"
           stroke="#AB82FF" stroke-width="1.0" opacity="0.22"
           transform="rotate(15 250 450)"/>
  <circle cx="405" cy="430" r="3.5" fill="none" stroke="#AB82FF" stroke-width="0.8" opacity="0.25"/>
  <circle cx="405" cy="430" r="1.2" fill="#AB82FF" opacity="0.35"/>
  <text x="140" y="390" fill="#AB82FF" opacity="0.18" font-size="7"
        font-family="monospace" letter-spacing="1">
    TLI_BURN // dV 3.13 km/s
  </text>
  <text x="370" y="450" fill="#AB82FF" opacity="0.15" font-size="6.5"
        font-family="monospace" letter-spacing="1">
    APOAPSIS: 384,400km
  </text>

  <!-- LEO parking orbit – bottom right -->
  <ellipse cx="1100" cy="650" rx="120" ry="50" fill="none"
           stroke="#4FC3F7" stroke-width="0.9" opacity="0.2"
           transform="rotate(-10 1100 650)"/>
  <text x="1010" y="618" fill="#4FC3F7" opacity="0.16" font-size="6.5"
        font-family="monospace" letter-spacing="1">
    LEO PARKING // 405x410km
  </text>

  <!-- GTO insertion curve – top left -->
  <path d="M 80,120 Q 200,50 350,130 T 500,100" fill="none"
        stroke="#4FC3F7" stroke-width="0.9" opacity="0.2"/>
  <text x="200" y="60" fill="#4FC3F7" opacity="0.16" font-size="6.5"
        font-family="monospace" letter-spacing="1">
    GTO INSERTION // e=0.7304
  </text>

  <!-- Mars transit arc – mid-bottom -->
  <path d="M 500,750 Q 700,680 900,780 T 1200,720" fill="none"
        stroke="#AB82FF" stroke-width="0.9" opacity="0.18"
        stroke-dasharray="4 6"/>
  <text x="680" y="698" fill="#AB82FF" opacity="0.14" font-size="6.5"
        font-family="monospace" letter-spacing="1">
    MARS TRANSIT WINDOW // C3 12.4 km²/s²
  </text>

  <!-- Approach vector – right edge -->
  <path d="M 1300,400 Q 1350,300 1280,200" fill="none"
        stroke="#4FC3F7" stroke-width="0.8" opacity="0.2"/>
  <circle cx="1280" cy="200" r="3" fill="none" stroke="#4FC3F7" stroke-width="0.7" opacity="0.25"/>
  <text x="1310" y="310" fill="#4FC3F7" opacity="0.14" font-size="6.5"
        font-family="monospace" letter-spacing="1"
        transform="rotate(-70 1310 310)">
    APPROACH VECTOR
  </text>
