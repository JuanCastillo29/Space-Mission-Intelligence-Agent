  <!-- ═══ CONSTELLATION VECTORS ═══ -->
  <polyline points="890,30 950,130 1020,50 1150,22" fill="none" stroke="#4FC3F7" stroke-width="0.7" opacity="0.25"/>
  <polyline points="950,130 1120,185" fill="none" stroke="#4FC3F7" stroke-width="0.6" opacity="0.18"/>
  <polyline points="85,180 150,120 250,210 300,500" fill="none" stroke="#4FC3F7" stroke-width="0.6" opacity="0.18"/>
