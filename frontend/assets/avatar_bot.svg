<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 18 44 30" fill="none">
  <!-- Satellite body -->
  <rect x="22" y="24" width="20" height="16" rx="3" stroke="#4FC3F7" stroke-width="2.5" fill="rgba(79,195,247,0.1)"/>
  <!-- Solar panel left -->
  <rect x="4" y="28" width="16" height="8" rx="1.5" stroke="#AB82FF" stroke-width="2" fill="rgba(171,130,255,0.1)"/>
  <line x1="8" y1="28" x2="8" y2="36" stroke="#AB82FF" stroke-width="1" opacity="0.4"/>
  <line x1="12" y1="28" x2="12" y2="36" stroke="#AB82FF" stroke-width="1" opacity="0.4"/>
  <line x1="16" y1="28" x2="16" y2="36" stroke="#AB82FF" stroke-width="1" opacity="0.4"/>
  <!-- Solar panel right -->
  <rect x="44" y="28" width="16" height="8" rx="1.5" stroke="#AB82FF" stroke-width="2" fill="rgba(171,130,255,0.1)"/>
  <line x1="48" y1="28" x2="48" y2="36" stroke="#AB82FF" stroke-width="1" opacity="0.4"/>
  <line x1="52" y1="28" x2="52" y2="36" stroke="#AB82FF" stroke-width="1" opacity="0.4"/>
  <line x1="56" y1="28" x2="56" y2="36" stroke="#AB82FF" stroke-width="1" opacity="0.4"/>
  <!-- Antenna -->
  <line x1="32" y1="24" x2="32" y2="18" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="16.5" r="2.5" fill="#4FC3F7"/>
  <!-- Lens/sensor -->
  <circle cx="32" cy="32" r="4.5" stroke="#4FC3F7" stroke-width="2" fill="rgba(79,195,247,0.15)"/>
  <circle cx="32" cy="32" r="2" fill="#4FC3F7"/>
</svg>
