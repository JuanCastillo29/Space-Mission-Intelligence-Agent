name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements/requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy db scripts --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: space_agent
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: space_intelligence
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U space_agent -d space_intelligence"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: space_agent
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: space_intelligence
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements/requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker build -f docker/dev.dockerfile -t space-agent-dev:test .
